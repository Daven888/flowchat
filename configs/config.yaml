server:
  port: 8081

mysql:
  host: 127.0.0.1
  port: 3308
  user: root
  password: root
  database: flowchat

redis:
  addr: 127.0.0.1:6380
  password: ""
  db: 0

jwt:
  secret: flowchat-secret
  expire_hours: 24

chat:
  session_lock_ttl_seconds: 180
  max_message_length: 4000

ai:
  providers:
    deepseek:
      type: openai_compatible
      base_url: https://api.deepseek.com
      display_name: DeepSeek
    siliconflow:
      type: openai_compatible
      base_url: https://api.siliconflow.cn/v1
      display_name: SiliconFlow

credential:
  encryption_key_env: FLOWCHAT_CREDENTIAL_SECRET

models:
  - name: mock
    provider: mock
    api_model: mock
    enabled: true
    max_context_messages: 10
    timeout_seconds: 120
    max_retries: 0
    context_compression:
      enabled: true
      max_messages_before_compress: 30

  - name: deepseek-chat
    provider: deepseek
    api_model: deepseek-chat
    enabled: true
    max_context_messages: 10
    timeout_seconds: 120
    max_retries: 1
    context_compression:
      enabled: true
      max_messages_before_compress: 30

  - name: qwen2.5-7b
    provider: siliconflow
    api_model: Qwen/Qwen2.5-7B-Instruct
    enabled: false
    max_context_messages: 10
    timeout_seconds: 120
    max_retries: 1
    context_compression:
      enabled: true
      max_messages_before_compress: 30

sensitive_words:
  - sensitive_word_1
  - sensitive_word_2
